global:
  scrape_interval: 15s
  evaluation_interval: 15s

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - '127.0.0.1:9097'

# Load rules once and periodically evaluate them
rule_files:
  - 'nomad_alerts.yml'

# Scrape configurations
scrape_configs:
  # Nomad server metrics
  - job_name: 'nomad'
    consul_sd_configs:
      - server: 'localhost:8500'
        services: ['nomad']
    metrics_path: '/v1/metrics'
    params:
      format: ['prometheus']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job

  # Nomad client metrics
  - job_name: 'nomad-client'
    consul_sd_configs:
      - server: 'localhost:8500'
        services: ['nomad-client']
    metrics_path: '/v1/metrics'
    params:
      format: ['prometheus']

  # Consul metrics
  - job_name: 'consul'
    static_configs:
      - targets: ['localhost:8500']
    metrics_path: '/v1/agent/metrics'
    params:
      format: ['prometheus']

  # Services health endpoints (FastAPI /health)
  - job_name: 'services'
    consul_sd_configs:
      - server: 'localhost:8500'
        services:
          - 'auth-service'
          - 'project-service'
          - 'secrets-service'
          - 'deployment-service'
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: service_name
