name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:

  lint-auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run ruff check src/
      - run: uv run mypy src/

  lint-project-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/project-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run ruff check src/
      - run: uv run mypy src/

  lint-secrets-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/secrets-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run ruff check src/
      - run: uv run mypy src/

  test-auth-service:
    runs-on: ubuntu-latest
    needs: lint-auth-service
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run pytest -v --tb=short

  test-project-service:
    runs-on: ubuntu-latest
    needs: lint-project-service
    defaults:
      run:
        working-directory: services/project-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run pytest -v --tb=short

  test-secrets-service:
    runs-on: ubuntu-latest
    needs: lint-secrets-service
    defaults:
      run:
        working-directory: services/secrets-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run pytest -v --tb=short

  test-deployment-service-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/deployment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v -race

  validate-nomad-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nomad
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y nomad
      - name: Validate Nomad jobs
        run: |
          for f in infra/nomad-stack/jobs/*.nomad; do
            echo "Validating $f..."
            nomad job validate -var="project_root=/tmp/devops-platform" "$f"
          done

  build-docker-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - test-auth-service
      - test-project-service
      - test-secrets-service
    strategy:
      matrix:
        service:
          - auth-service
          - project-service
          - secrets-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: devops-platform/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
